<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B241C">
  <title>Pflänzchen — das Gieß-Spiel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="scene">

    <header class="hud">
      <p class="eyebrow">Mein kleines Gewächshaus</p>
      <h1 class="height"><span id="cm">9</span><span class="unit">cm</span></h1>
      <p class="stage" id="stage">Keimling</p>
    </header>

    <div class="stage-area">
      <svg id="scene-svg" viewBox="0 0 360 460" role="img" aria-label="Eine wachsende Topfpflanze">
        <defs>
          <linearGradient id="potGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#CE7550"/>
            <stop offset="1" stop-color="#9E4F34"/>
          </linearGradient>
          <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#DE8760"/>
            <stop offset="1" stop-color="#B25B3C"/>
          </linearGradient>
          <linearGradient id="leafGrad" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0" stop-color="#3F8A4E"/>
            <stop offset="1" stop-color="#9AD46F"/>
          </linearGradient>
          <radialGradient id="dropGrad" cx="0.35" cy="0.3" r="0.9">
            <stop offset="0" stop-color="#E2F7FB"/>
            <stop offset="1" stop-color="#63BEDB"/>
          </radialGradient>
        </defs>

        <!-- Schatten unter dem Topf -->
        <ellipse cx="180" cy="424" rx="92" ry="9" fill="rgba(0,0,0,.28)"/>

        <!-- Topf -->
        <path d="M108 348 C110 380 120 408 130 414 Q135 418 145 418 L215 418 Q225 418 230 414 C240 408 250 380 252 348 Z" fill="url(#potGrad)"/>
        <rect x="96" y="326" width="168" height="26" rx="12" fill="url(#rimGrad)"/>
        <ellipse id="soil" cx="180" cy="332" rx="72" ry="9" fill="#4A3226"/>

        <!-- Pflanze -->
        <g id="plant-wrap">
          <g id="plant">
            <path id="stem" fill="none" stroke="#57A863" stroke-linecap="round"/>
            <g id="leaves"></g>
            <g id="flower"></g>
          </g>
        </g>

        <!-- Tropfen & Spritzer -->
        <g id="drops"></g>
      </svg>
    </div>

    <footer class="controls">
      <p class="hint" id="hint">Tippe, um zu gießen</p>
      <button id="water-btn" class="water-btn" aria-label="Pflanze gießen">
        <svg viewBox="0 0 24 24" width="34" height="34" aria-hidden="true">
          <path d="M12 2.5 C12 2.5 5.5 10.4 5.5 15 A6.5 6.5 0 0 0 18.5 15 C18.5 10.4 12 2.5 12 2.5 Z"
                fill="#FDFEFF" opacity="0.95"/>
        </svg>
      </button>
      <p class="record" id="record">Rekord: 9 cm</p>
    </footer>

  </main>
  <script src="script.js"></script>
</body>
</html>
